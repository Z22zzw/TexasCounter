# 公网访问：浏览器访问 http://<服务器公网IP>/ （静态页）
# API：http://<服务器公网IP>/api/...
# 后端仅在内网容器端口 3000，由 nginx 反代，勿单独暴露 3000 到公网（可选调试时再映射）

services:
  nginx:
    image: nginx:alpine
    container_name: texas-counter-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - server

  server:
    image: texas-counter-server:latest
    container_name: texas-counter-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=/data/data.db
    volumes:
      - ./data:/data

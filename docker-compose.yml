version: "3.9"

services:
  server:
    image: texas-counter-server:latest
    container_name: texas-counter
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATABASE_URL=/data/data.db
    volumes:
      - ./data:/data

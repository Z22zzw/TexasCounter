name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_IMAGE: texas-counter-server
  DEPLOY_HOST: 1.14.183.170
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/texas-counter
  # GitHub Actions: use Node 24 runtime for JS-based actions (see GH changelog 2025-09-19)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Run tests
        working-directory: server
        run: |
          npm ci
          npm run test

      # Image tarball must live under $GITHUB_WORKSPACE: appleboy/scp-action runs in Docker and only mounts the workspace (not host /tmp).
      - name: Build Docker image
        working-directory: server
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:latest .
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > "${GITHUB_WORKSPACE}/artifacts/texas-counter.tar.gz"
          ls -lh "${GITHUB_WORKSPACE}/artifacts/texas-counter.tar.gz"

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: artifacts/texas-counter.tar.gz
          target: /tmp/

      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            docker load -i /tmp/texas-counter.tar.gz
            docker compose down
            docker compose up -d
            docker image prune -f
            rm -f /tmp/texas-counter.tar.gz

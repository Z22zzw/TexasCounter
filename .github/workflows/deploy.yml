# 部署流程
# 1) 测试并编译后端 → 构建 Docker 镜像
# 2) 打包：镜像 tar.gz +（docker-compose + nginx + web）bundle
# 3) SCP 到服务器 /tmp（源码须在 $GITHUB_WORKSPACE，scp-action 才能读到）
# 4) SSH：解压到 DEPLOY_PATH → docker load → docker compose up
#
# 公网访问：浏览器 http://<DEPLOY_HOST>/ 静态页；API http://<DEPLOY_HOST>/api/...
# 后端仅容器内 3000，由 nginx 反代（可不向公网映射 3000）
#
# Secrets: SSH_PRIVATE_KEY
# 修改部署目标：改下方 env 中的 DEPLOY_HOST / DEPLOY_USER / DEPLOY_PATH

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_IMAGE: texas-counter-server
  DEPLOY_HOST: 1.14.183.170
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/texas-counter
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Test backend
        working-directory: server
        run: |
          npm ci
          npm run test
          npm run build

      - name: Build Docker image (backend)
        working-directory: server
        run: docker build -t "${DOCKER_IMAGE}:latest" .

      - name: Pack artifacts
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/artifacts"
          docker save "${DOCKER_IMAGE}:latest" | gzip > "${GITHUB_WORKSPACE}/artifacts/texas-counter.tar.gz"
          tar czf "${GITHUB_WORKSPACE}/artifacts/deploy-bundle.tar.gz" \
            docker-compose.yml nginx web
          ls -lh "${GITHUB_WORKSPACE}/artifacts/"

      - name: Upload Docker image tarball
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: artifacts/texas-counter.tar.gz
          target: /tmp/

      - name: Upload compose + nginx + static web
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: artifacts/deploy-bundle.tar.gz
          target: /tmp/

      - name: Remote deploy (load image + compose up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH"
            tar xzf /tmp/deploy-bundle.tar.gz -C "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            docker load -i /tmp/texas-counter.tar.gz
            docker compose down || true
            docker compose up -d
            docker image prune -f
            rm -f /tmp/texas-counter.tar.gz /tmp/deploy-bundle.tar.gz
